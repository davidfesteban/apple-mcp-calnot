x-deploy-agent:
  enabled: true
  force_redeploy: true
  clean_deploy: false
  descriptor: public-web

services:
  mcp-notes:
    build: .
    restart: unless-stopped
    environment:
      PORT: "3000"
      MONGO_URL: mongodb://mcp-notes-mongo:27017
      MONGO_DB: apple_mcp_calnot
      DATA_DIR: /data
      APPLE_NOTES_URL: https://www.icloud.com/notes
      BROWSER_HEADLESS: "true"
      CHECK_INTERVAL_MS: "300000"
    volumes:
      - mcp-notes-data:/data
    labels:
      caddy: "notes.mcp.misei.dev"
      caddy.reverse_proxy: "{{upstreams 3000}}"
      homepage.group: "Deployments"
      homepage.name: "Apple MCP Notes"
      homepage.icon: "web"
      homepage.href: "https://notes.mcp.misei.dev"
      homepage.description: "iCloud Notes MCP bridge"
    networks:
      - public
      - default
    depends_on:
      - mcp-notes-mongo

  mcp-notes-mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - default

networks:
  public:
    name: public
    external: true

volumes:
  mcp-notes-data:
  mongo-data:
